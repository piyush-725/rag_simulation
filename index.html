<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Architecture Dashboard</title>
    <style>
        :root {
            --bg-main: #09090b;
            --bg-panel: #18181b;
            --border: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --highlight: #8b5cf6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Layout */
        .sidebar { width: 350px; background-color: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { padding: 20px; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .header h1::before { content: ''; display: block; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; }

        .panel-section { padding: 20px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
        .panel-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 600; }

        /* Forms & Inputs */
        textarea, input[type="text"] { width: 100%; background: var(--bg-main); border: 1px solid var(--border); color: var(--text-main); padding: 12px; border-radius: 8px; font-size: 0.9rem; resize: vertical; transition: border-color 0.2s; }
        textarea:focus, input[type="text"]:focus { outline: none; border-color: var(--accent); }
        
        button { background: var(--accent); color: white; border: none; padding: 10px 16px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        button:hover { background: var(--accent-hover); }
        button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        button.secondary:hover { background: var(--border); }

        /* Vector DB Visuals */
        .db-container { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg-main); }
        .chunk-card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .chunk-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: transparent; transition: background 0.3s; }
        .chunk-card.matched { border-color: var(--highlight); transform: translateX(5px); }
        .chunk-card.matched::before { background: var(--highlight); }
        
        .chunk-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; font-family: monospace; }
        .chunk-text { font-size: 0.9rem; line-height: 1.5; color: var(--text-main); }
        
        /* Chat / Console Area */
        .console-area { height: 45%; background: var(--bg-panel); border-top: 1px solid var(--border); display: flex; flex-direction: column; }
        .console-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; }
        .tab { font-size: 0.85rem; color: var(--text-muted); cursor: pointer; padding-bottom: 12px; margin-bottom: -13px; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        
        .console-content { flex: 1; padding: 20px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; line-height: 1.6; }
        
        .log-step { margin-bottom: 16px; opacity: 0; animation: fadeIn 0.5s forwards; }
        .log-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-bottom: 6px; }
        .badge-system { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .badge-retrieval { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
        .badge-llm { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        
        .augmented-prompt { background: #000; border: 1px solid #333; padding: 12px; border-radius: 6px; color: #a1a1aa; margin-top: 8px; white-space: pre-wrap; }
        .augmented-prompt span.context { color: #fde047; }
        .augmented-prompt span.question { color: #60a5fa; }

        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <h1>Backend Pipeline</h1>
        </div>

        <div class="panel-section">
            <span class="panel-title">1. Data Ingestion</span>
            <p style="font-size: 0.8rem; color: var(--text-muted);">Paste raw documents here to update the Knowledge Base.</p>
            <textarea id="rawInput" rows="6">Stripe is a financial infrastructure platform for the internet. It was founded by Patrick and John Collison in 2010.
The API allows businesses to accept payments, send payouts, and manage their businesses online.
Stripe's headquarters are located in South San Francisco, California, and Dublin, Ireland.
Radar is Stripe's fraud prevention tool that uses machine learning to score transactions.</textarea>
            <button onclick="processData()">Chunk & Embed Data</button>
        </div>

        <div class="panel-section" style="flex: 1; overflow-y: auto;">
            <span class="panel-title">2. User Query</span>
            <p style="font-size: 0.8rem; color: var(--text-muted);">Simulate a user asking a question.</p>
            <input type="text" id="queryInput" placeholder="e.g., Where is Stripe located?">
            <div style="display: flex; gap: 10px;">
                <label style="font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px;">
                    Top-K: <input type="number" id="topK" value="2" min="1" max="5" style="width: 50px; padding: 4px;">
                </label>
            </div>
            <button onclick="runRAG()" style="background: var(--highlight);">Execute RAG Pipeline</button>
        </div>
    </div>

    <div class="main-content">
        <div class="db-container" id="vectorDB">
            <span class="panel-title" style="display: block; margin-bottom: 15px;">Vector Database (Embeddings)</span>
            <div id="chunksList">
                </div>
        </div>

        <div class="console-area">
            <div class="console-header">
                <div class="tab active">System Logs & LLM Prompt</div>
            </div>
            <div class="console-content" id="consoleOutput">
                <div style="color: var(--text-muted);">System initialized. Waiting for data pipeline...</div>
            </div>
        </div>
    </div>

    <script>
        let database = [];

        // Simple hash generator to simulate vector embeddings
        const generateHash = () => Math.random().toString(36).substring(2, 10) + Math.random().toString(36).substring(2, 10);

        function processData() {
            const rawText = document.getElementById('rawInput').value;
            const chunksList = document.getElementById('chunksList');
            const consoleOut = document.getElementById('consoleOutput');
            
            database = [];
            chunksList.innerHTML = '';
            consoleOut.innerHTML = '<div class="log-step"><span class="log-badge badge-system">SYSTEM</span> Starting ingestion pipeline...</div>';

            // Split by newlines and sentences to create chunks
            const rawChunks = rawText.split('\n').filter(t => t.trim().length > 0);

            rawChunks.forEach((text, index) => {
                const vectorId = `vec_${generateHash()}`;
                database.push({ id: index, text: text.trim(), vectorId: vectorId });

                // Render in UI
                const card = document.createElement('div');
                card.className = 'chunk-card';
                card.id = `chunk-${index}`;
                card.innerHTML = `
                    <div class="chunk-meta">
                        <span>ID: ${index}</span>
                        <span>EMBEDDING: [${vectorId}]</span>
                    </div>
                    <div class="chunk-text">${text}</div>
                `;
                chunksList.appendChild(card);
            });

            setTimeout(() => {
                consoleOut.innerHTML += `<div class="log-step"><span class="log-badge badge-system">SUCCESS</span> Chunked into ${database.length} segments and stored in Vector DB.</div>`;
            }, 500);
        }

        function runRAG() {
            const query = document.getElementById('queryInput').value;
            const topK = parseInt(document.getElementById('topK').value, 10);
            const consoleOut = document.getElementById('consoleOutput');

            if (!query || database.length === 0) return alert("Please ingest data and enter a query.");

            // Reset UI
            document.querySelectorAll('.chunk-card').forEach(c => c.classList.remove('matched'));
            consoleOut.innerHTML = `<div class="log-step"><span class="log-badge badge-system">QUERY</span> User asked: "${query}"</div>`;

            // Step 1: Retrieval (Simulated Semantic Search via keyword overlap)
            let scoredChunks = database.map(chunk => {
                let score = 0;
                query.toLowerCase().split(' ').forEach(word => {
                    if (word.length > 3 && chunk.text.toLowerCase().includes(word)) score++;
                });
                // Fallback random score if no keywords match to simulate semantic proximity
                if (score === 0) score = Math.random() * 0.5; 
                return { ...chunk, score };
            });

            // Sort by score and grab Top K
            scoredChunks.sort((a, b) => b.score - a.score);
            const retrieved = scoredChunks.slice(0, topK);

            // Highlight in DB
            setTimeout(() => {
                retrieved.forEach(chunk => {
                    const el = document.getElementById(`chunk-${chunk.id}`);
                    el.classList.add('matched');
                    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                });

                consoleOut.innerHTML += `<div class="log-step"><span class="log-badge badge-retrieval">RETRIEVAL</span> Found ${topK} relevant chunks via vector similarity search.</div>`;
            }, 600);

            // Step 2: Augmentation
            setTimeout(() => {
                const contextText = retrieved.map(r => r.text).join(' ');
                
                consoleOut.innerHTML += `
                    <div class="log-step">
                        <span class="log-badge badge-system">AUGMENTATION</span> Constructing strict prompt for LLM...
                        <div class="augmented-prompt">You are a precise assistant. Answer the user's question using ONLY the context provided below. If the answer is not in the context, say "I don't know".\n\n&lt;context&gt;\n<span class="context">${contextText}</span>\n&lt;/context&gt;\n\n&lt;question&gt;\n<span class="question">${query}</span>\n&lt;/question&gt;</div>
                    </div>`;
            }, 1200);

            // Step 3: Generation (Simulated)
            setTimeout(() => {
                consoleOut.innerHTML += `<div class="log-step"><span class="log-badge badge-llm">GENERATION</span> <strong style="color: #fff;">LLM Output:</strong> Based on the provided context, ${retrieved[0].text.substring(0, 40)}...</div>`;
                consoleOut.scrollTop = consoleOut.scrollHeight;
            }, 2000);
        }

        // Init
        processData();
    </script>
</body>
</html>
